<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhotoGuessr Simple</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; margin: 0; padding: 20px; }
        #game-container { max-width: 600px; margin: auto; background: #1e1e1e; padding: 20px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        img { max-width: 100%; max-height: 400px; border-radius: 8px; margin-bottom: 20px; display: none; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 40px; height: 40px; animation: spin 2s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        input[type=range] { width: 100%; margin: 20px 0; }
        button { background: #3498db; border: none; padding: 10px 20px; color: white; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button:hover { background: #2980b9; }
        #result { margin-top: 20px; font-weight: bold; font-size: 1.2em; }
    </style>
</head>
<body>

<div id="game-container">
    <h1>PhotoGuessr</h1>
    <div id="loader" class="loader"></div>
    <img id="photo" src="" alt="Photo à deviner">
    
    <div id="controls" style="display:none;">
        <p>En quelle année cette photo a-t-elle été prise ?</p>
        <h2 id="year-display">1960</h2>
        <input type="range" id="year-slider" min="1850" max="2024" value="1960">
        <br>
        <button onclick="checkAnswer()">Valider</button>
    </div>

    <div id="result"></div>
    <button id="next-btn" style="display:none; margin-top: 10px; background: #27ae60;" onclick="startGame()">Image suivante</button>
</div>

<script>
    let correctYear = 0;
    const photoInput = document.getElementById('photo');
    const loader = document.getElementById('loader');
    const controls = document.getElementById('controls');
    const yearDisplay = document.getElementById('year-display');
    const yearSlider = document.getElementById('year-slider');
    const resultDiv = document.getElementById('result');
    const nextBtn = document.getElementById('next-btn');

    // Mise à jour de l'affichage de l'année quand on bouge le curseur
    yearSlider.oninput = function() { yearDisplay.innerText = this.value; }

    async function startGame() {
        // Reset l'interface
        resultDiv.innerText = "";
        nextBtn.style.display = "none";
        controls.style.display = "none";
        photoInput.style.display = "none";
        loader.style.display = "block";

        try {
            // On cherche une image aléatoire sur Wikimedia Commons qui a une date
            const response = await fetch(`https://commons.wikimedia.org/w/api.php?action=query&format=json&origin=*&generator=random&grnnamespace=6&prop=imageinfo&iiprop=url|timestamp|extmetadata&iiurlwidth=600`);
            const data = await response.json();
            const page = Object.values(data.query.pages)[0];
            const info = page.imageinfo[0];
            
            // Extraction de l'année (souvent dans DateTime ou DateTimeOriginal)
            let dateStr = info.extmetadata.DateTimeOriginal ? info.extmetadata.DateTimeOriginal.value : info.timestamp;
            let match = dateStr.match(/\d{4}/); // Trouve le premier groupe de 4 chiffres (l'année)

            if (!match || match[0] < 1850) { // Si pas d'année ou trop vieux, on recommence
                startGame();
                return;
            }

            correctYear = parseInt(match[0]);
            photoInput.src = info.url;
            
            photoInput.onload = () => {
                loader.style.display = "none";
                photoInput.style.display = "block";
                controls.style.display = "block";
            };

        } catch (error) {
            console.error("Erreur de chargement", error);
            startGame();
        }
    }

    function checkAnswer() {
        const guess = parseInt(yearSlider.value);
        const diff = Math.abs(guess - correctYear);
        let score = Math.max(0, 1000 - (diff * 50));

        if (diff === 0) {
            resultDiv.innerHTML = `<span style="color: #27ae60;">PARFAIT !</span> C'était bien en ${correctYear}.`;
        } else {
            resultDiv.innerHTML = `C'était en <b>${correctYear}</b>.<br>Écart : ${diff} ans. Score : ${score}/1000`;
        }
        
        controls.style.display = "none";
        nextBtn.style.display = "inline-block";
    }

    // Lancer le jeu au chargement
    startGame();
</script>

</body>
</html>
