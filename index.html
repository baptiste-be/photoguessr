<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhotoGuessr Retro</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a1a; color: #eee; text-align: center; margin: 0; padding: 10px; }
        #game-container { max-width: 500px; margin: 20px auto; background: #2d2d2d; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .img-wrapper { width: 100%; height: 300px; display: flex; align-items: center; justify-content: center; background: #000; border-radius: 10px; overflow: hidden; margin-bottom: 20px; }
        img { max-width: 100%; max-height: 100%; object-fit: contain; display: none; }
        .loader { border: 4px solid #444; border-top: 4px solid #ffcc00; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        input[type=range] { width: 100%; height: 15px; border-radius: 5px; background: #444; outline: none; -webkit-appearance: none; margin: 25px 0; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 25px; height: 25px; border-radius: 50%; background: #ffcc00; cursor: pointer; border: 3px solid #1a1a1a; }
        button { background: #ffcc00; border: none; padding: 12px 30px; color: #1a1a1a; border-radius: 50px; cursor: pointer; font-weight: bold; font-size: 18px; transition: 0.2s; }
        button:active { transform: scale(0.95); }
        #result { margin-top: 20px; font-size: 1.2em; line-height: 1.4; }
        .score-val { color: #ffcc00; font-size: 1.5em; display: block; }
    </style>
</head>
<body>

<div id="game-container">
    <h1 style="color: #ffcc00; margin-top: 0;">PhotoGuessr</h1>
    
    <div class="img-wrapper">
        <div id="loader" class="loader"></div>
        <img id="photo" src="" alt="Photo historique">
    </div>
    
    <div id="controls" style="display:none;">
        <p>Année : <b id="year-display" style="font-size: 2em; color: #ffcc00;">1950</b></p>
        <input type="range" id="year-slider" min="1840" max="2024" value="1950">
        <br>
        <button onclick="checkAnswer()">VALIDER</button>
    </div>

    <div id="result"></div>
    <button id="next-btn" style="display:none; margin-top: 15px; background: #eee;" onclick="startGame()">IMAGE SUIVANTE</button>
</div>

<script>
    let correctYear = 0;
    const photoImg = document.getElementById('photo');
    const loader = document.getElementById('loader');
    const controls = document.getElementById('controls');
    const yearDisplay = document.getElementById('year-display');
    const yearSlider = document.getElementById('year-slider');
    const resultDiv = document.getElementById('result');
    const nextBtn = document.getElementById('next-btn');

    // Retour haptique et mise à jour affichage
    yearSlider.oninput = function() {
        yearDisplay.innerText = this.value;
        if (window.navigator.vibrate) {
            window.navigator.vibrate(10); // Petit "tic" sur mobile
        }
    };

    async function startGame() {
        resultDiv.innerHTML = "";
        nextBtn.style.display = "none";
        controls.style.display = "none";
        photoImg.style.display = "none";
        loader.style.display = "block";

        try {
            // On cherche des images avec des mots clés "History" ou "Archive" pour plus de pertinence
            const searchTerms = ['History', 'Archive', 'Old+photo', 'Vintage'];
            const term = searchTerms[Math.floor(Math.random() * searchTerms.length)];
            
            const response = await fetch(`https://commons.wikimedia.org/w/api.php?action=query&format=json&origin=*&generator=random&grnnamespace=6&prop=imageinfo&iiprop=url|timestamp|extmetadata&iiurlwidth=800&q=${term}`);
            const data = await response.json();
            const page = Object.values(data.query.pages)[0];
            const info = page.imageinfo[0];
            
            // Extraction de l'année
            let dateVal = "";
            if(info.extmetadata.DateTimeOriginal) dateVal = info.extmetadata.DateTimeOriginal.value;
            else if(info.extmetadata.DateTime) dateVal = info.extmetadata.DateTime.value;
            else dateVal = info.timestamp;

            let match = dateVal.match(/\d{4}/);

            // Filtre : on veut des vraies dates cohérentes
            if (!match || match[0] < 1840 || match[0] > 2025) {
                startGame();
                return;
            }

            correctYear = parseInt(match[0]);
            photoImg.src = info.url;
            
            photoImg.onload = () => {
                loader.style.display = "none";
                photoImg.style.display = "block";
                controls.style.display = "block";
            };

        } catch (e) {
            startGame();
        }
    }

    function checkAnswer() {
        const guess = parseInt(yearSlider.value);
        const diff = Math.abs(guess - correctYear);
        
        // Nouveau calcul de score plus équilibré
        // 5000 points max, on perd des points selon l'écart
        let score = Math.max(0, 5000 - (diff * diff * 5)); 
        if (diff > 30) score = Math.max(0, 1000 - (diff * 10)); // Sécurité pour les gros écarts

        if (window.navigator.vibrate) window.navigator.vibrate([50, 30, 50]);

        resultDiv.innerHTML = `
            L'année était <b style="color:#ffcc00">${correctYear}</b><br>
            Écart : ${diff} ans<br>
            <span class="score-val">${score} PTS</span>
        `;
        
        controls.style.display = "none";
        nextBtn.style.display = "inline-block";
    }

    startGame();
</script>

</body>
</html>
